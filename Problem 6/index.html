<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
    <style>
        table, td, th
        {
            border: 1px solid black;
            border-collapse: collapse;
          
        }
    </style>
</head>
<body>
    <form >
        <label for="name">Student Name:</label>
        <input type="text" name="name" id="name">
        <br> <br>
        <label for="mark">Student Mark:</label>
        <input type="number" name="mark" id="mark">
        <br> <br>
        <input type="submit" value="Submit" onclick="return valid(event)">
    </form>
    <br><br>
    <table>
        <tr>
            <th>Name</th>
            <th>Marks</th>
        </tr>
    </table>


    <script>
        let name=document.getElementById("name");
        let mark=document.getElementById("mark")
        function valid(event)
        {
            event.preventDefault()
            if(name.value=="" )
            {
                return false;
            }
            if(mark.value<0 || mark.value>100)
            {
                return false;
            }
            else
            {

                let tables =document.getElementsByTagName("table");
                let table = tables[0];

                let newrow=document.createElement("tr");
                if(mark.value>50)
                {
                    newrow.style.backgroundColor ="green"
                    
                }
                else
                {
                    newrow.style.backgroundColor ="red"
                }
                let td1 = document.createElement("td");
                td1.innerHTML=name.value;
                newrow.appendChild(td1);
                let td2=document.createElement("td");
                td2.innerHTML=mark.value;
                newrow.appendChild(td2);
                table.appendChild(newrow);


                return true;

               
            }

        }
        function add()
        {

        }


    </script>

</body>
</html>
