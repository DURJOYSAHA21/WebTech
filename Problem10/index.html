<!doctype html>
    <html>
        <head>
            <link rel="stylesheet" href="style.css">
        </head>
        <body>
            <header>My Platform</header>
            <fieldset class="part">
                <p>Course Enrollment Panel</p>
                <p>JavaScript Basics Price:100tk</p>
                <form>
                    <label for="quantity">Quantity: </label>
                    <input type="number" id="quantity" name="quantity">

                </form>
                <div id="totalfee"></div>
                <div id="error"></div>
                <div id="bonus"></div>
            </fieldset>
            <fieldset class="part">
                <div>Enrollment Details</div>
                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name"><br><br>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email"><br> <br>

                    <select id="drop">
                    <option>---Select----</option>
                    <option value="online">Online</option>
                    <option value="campus">On-campus</option>
                    </select>
                    <span id="cost"></span>
                    <label for="check">I confirm my enrollment details are correct</label>
                    <input type="checkbox" id="check" name="check"><br><br>
                    <input type="button" id="btn" value="submit">
                </form>
     
            </fieldset>

            <footer>All Rights Reserved 2026</footer>


            <script src="script.js"></script>
        </body>
    </html>
